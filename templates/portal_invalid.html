<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Link unavailable</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Source+Serif+4:opsz,wght@8..60,300;8..60,400&display=swap" rel="stylesheet">
  <style>
    /* Site palette + typography (matches sardinetracker base.html, dark default) */
    body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
      background:#0e0e12; color:#ffffff; font-weight:300; line-height:1.6;
      font-family:'Source Serif 4','Times New Roman',Georgia,serif; }
    .card { max-width:440px; margin:24px; padding:28px 30px; background:#16161d;
      border:1px solid #2a2a38; border-radius:12px; text-align:center; }
    h1 { font-family:'Playfair Display','Times New Roman',Georgia,serif;
      font-size:1.3rem; font-weight:600; margin:0 0 10px; }
    p { color:rgb(202, 196, 223); font-size:0.95rem; margin:0; }
  </style>
</head>
<body>
  <div class="card">
    <h1>This link is no longer available</h1>
    <p>It may have expired or been turned off by the patient. If you still need
       access to this record, please ask them to send a fresh link.</p>
  </div>
</body>
</html>
