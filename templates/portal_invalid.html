  <meta name="robots" content="noindex, nofollow">
  <title>Link unavailable</title>
  <style>
    /* Site palette (matches sardinetrack base.html, dark default) */

    p { color:rgb(202, 196, 223); font-size:15px; line-height:1.55; margin:0; }

  <div class="card">
    <h1>This link is no longer available</h1>
